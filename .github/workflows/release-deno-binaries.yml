name: Release Deno Binaries

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write

concurrency:
  group: release-deno-binaries
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Deno binaries
        run: python deno_build.py --force --targets darwin linux

      - name: Smoke test Linux binary
        run: |
          set -eu
          ./validate-linux --version
          ./validate-linux \
            --schema-json survey.json \
            --form-json data-valid.json \
            --result-json output-valid.json
          python - <<'PY'
          import json
          with open("output-valid.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          assert data["valid"] is True, data
          PY

          if ./validate-linux \
            --schema-json survey.json \
            --form-json data-invalid.json \
            --result-json output-invalid.json; then
            echo "Expected invalid sample to fail"
            exit 1
          fi

          python - <<'PY'
          import json
          with open("output-invalid.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          assert data["valid"] is False, data
          assert data["errors"], data
          PY

      - name: Prepare release metadata
        id: meta
        run: |
          set -eu
          ts="$(date -u +'%Y%m%d-%H%M%S')"
          tag="deno-binaries-${ts}"
          title="Deno binaries ${ts} (UTC)"
          {
            echo "tag=${tag}"
            echo "title=${title}"
          } >> "$GITHUB_OUTPUT"

          sha256sum validate-linux validate-mac > checksums.txt

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            validate-linux \
            validate-mac \
            checksums.txt \
            --title "${{ steps.meta.outputs.title }}" \
            --notes "Automated scheduled build of Deno-compiled binaries."
